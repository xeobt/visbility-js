<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div id="div1"></div>
    <div id="div2"></div>
    <div id="div3"></div>
  </main>
  <aside>
    <button type="submit" onclick="div1()">Pokaz div1</button>
    <button type="submit" onclick="div2()">Pokaz div2</button>
    <button type="submit" onclick="div3()">Pokaz div3</button>
  </aside>


  <script>
    const d1 = document.getElementById("div1");
    d1.style.visibility = "hidden";
    const d2 = document.getElementById("div2");
    d2.style.visibility = "hidden";
    const d3 = document.getElementById("div3");
    d3.style.visibility = "hidden";

    function div1(){
      const d1 = document.getElementById("div1");
    d1.style.visibility = "visible";
    }

    function div2(){
      const d2 = document.getElementById("div2");
    d2.style.visibility = "visible";
    }

    function div3(){
      const d3 = document.getElementById("div3");
    d3.style.visibility = "visible";
    }
  </script>
</body>
</html>
